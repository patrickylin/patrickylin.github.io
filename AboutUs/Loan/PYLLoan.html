<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Love never fails">
    <meta name="keywords" content="GOD MADE US A FAMILY">
    <link rel="SHORTCUT ICON" type="image/x-icon" href="../../ico/the_lin.ico">
    <link rel="stylesheet" href="../../css/style.css" type="text/css">
    <script src="script.js"></script>
    <title>The Lin Family - Loan Calculator</title>
    <style>
    /* Local overrides specifically for the calculator page layout */
    .container {
      max-width: 580px;
      margin: 0 auto;
      /* Extra bottom padding (120px) ensures the absolute footer from style.css has plenty of room */
      padding: 30px 20px 120px 20px; 
      background: rgba(255, 255, 255, 0.95);
      min-height: 100vh;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      position: relative; /* This anchors your global footer to the bottom of this wrapper */
    }

    /* Banner Styling */
    .site-banner {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 40px auto;
      border: none;
    }

    /* Modern Calculator Form Layout (No Tables) */
    .calculator-wrapper {
      max-width: 550px;
      margin: 0 auto 50px auto;
      background: #f9f9f9;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #ddd;
    }
    .calculator-wrapper h2 {
      font-size: 20px;
      color: #1F497D;
      margin-bottom: 20px;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }
    .form-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .form-group label {
      flex: 1 1 200px;
      font-size: 15px;
      font-weight: 500;
      color: #444;
      margin-bottom: 5px;
    }
    .input-wrapper {
      flex: 1 1 200px;
      display: flex;
      align-items: center;
    }
    .input-wrapper span {
      font-size: 18px;
      color: #555;
    }
    .form-control {
      width: 100%;
      padding: 10px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
    }
    .form-control[readonly] {
      background: #eef2f5;
      color: #1F497D;
      font-weight: bold;
    }

    /* Modern Button */
    .calc-btn {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      color: #fff;
      background-color: #1F497D;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 25px 0;
      font-weight: bold;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .calc-btn:hover {
      background-color: #153257;
    }
  </style>
  </head>

  <body style="background-image: url('../../gif/back.gif');">

    <div class="container">

      <img src="../../png/loan_banner.png" alt="Loan Calculator"
        class="site-banner">

      <div class="calculator-wrapper">
        <form name="loandata">

          <h2>Enter Loan Information:</h2>

          <div class="form-group">
            <label>Amount of the loan:</label>
            <div class="input-wrapper">
              <span style="margin-right: 8px;">$</span>
              <input class="form-control" type="number" name="principal"
                onchange="calculate()">
            </div>
          </div>

          <div class="form-group">
            <label>Annual percentage rate:</label>
            <div class="input-wrapper">
              <input class="form-control" type="number" name="interest"
                step="0.01" onchange="calculate()">
              <span style="margin-left: 8px;">%</span>
            </div>
          </div>

          <div class="form-group">
            <label>Repayment period:</label>
            <div class="input-wrapper">
              <input class="form-control" type="number" name="years"
                onchange="calculate()">
              <span style="margin-left: 8px; font-size: 15px;">years</span>
            </div>
          </div>

          <button class="calc-btn" type="button"
            onclick="calculate()">CALCULATE</button>

          <h2>Payment Information:</h2>

          <div class="form-group">
            <label>Your monthly payment will be:</label>
            <div class="input-wrapper">
              <span style="margin-right: 8px;">$</span>
              <input class="form-control" type="text" name="payment" readonly>
            </div>
          </div>

          <div class="form-group">
            <label>Your total payment will be:</label>
            <div class="input-wrapper">
              <span style="margin-right: 8px;">$</span>
              <input class="form-control" type="text" name="total" readonly>
            </div>
          </div>

          <div class="form-group">
            <label>Your total interest will be:</label>
            <div class="input-wrapper">
              <span style="margin-right: 8px;">$</span>
              <input class="form-control" type="text" name="totalinterest"
                readonly>
            </div>
          </div>

        </form>
      </div>

      <hr class="footer-divider">

      <div class="footer-container">
        <div class="footer">
          <div class="footer-email">
            <a href="mailto:patrickylin@gmail.com"><img title="E-mail"
                src="../../png/E-mail.png" alt="Email"></a>
          </div>
          <div class="footer-text">
            <div class="footer-links">
              <a href="../../index.html">Home Page</a> |
              <a href="../../page2.html">About Us</a> |
              <a href="../../page3.html">Photo Album</a> |
              <a href="../../page4.html">Favorite Sites</a> |
              <a href="../../page5.html">What's New</a>
            </div>
            <div class="copyright">
              &copy; Copyright 1994 - 2026, The Lin Family. All rights
              reserved.<br>
              Last update: April, 2026.
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
