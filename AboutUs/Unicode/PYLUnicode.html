		<div class="calculator-wrapper">

			<form name="utfConverter">
				String: <input type="text" name="stringText" size="50">
				<input type="button" value="To UTF" onclick="ConvertFromText()">
				<input type="button" value="Clear All" onclick="ClearAll()">
				<p>
					<table>
						<tr>
							<td>
								UTF-8
							</td>
							<td>
								UTF-16
							</td>
							<td>
								UTF-32
							</td>
						</tr>
						<tr>
							<td>
								<textarea name="utf8Val" rows="20"></textarea>
							</td>
							<td>
								<textarea name="utf16Val" rows="20"></textarea>
							</td>
							<td>
								<textarea name="utf32Val" rows="20"></textarea>
							</td>
						</tr>
						<tr>
							<td>
								<input type="button" value="Convert From UTF-8"
									onclick="ConvertFromUTF8()">
							</td>
							<td>
								<input type="button" value="Convert From UTF-16"
									onclick="ConvertFromUTF16()">
							</td>
							<td>
								<input type="button" value="Convert From UTF-32"
									onclick="ConvertFromUTF32()">
							</td>
						</tr>
					</table>
				</div>
			</form>
